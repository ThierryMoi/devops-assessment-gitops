apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  namespace: ci-cd
  labels:
    app.kubernetes.io/part-of: assessment-app
spec:
  project: default

  source:
    repoURL: https://github.com/argoproj/argo-rollouts.git
    targetRevision: v1.8.0
    path: manifests/cluster-install

  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
