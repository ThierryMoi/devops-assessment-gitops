apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: assessment-app-prod

resources:
  - namespace.yaml
  - ../../base

# Jenkins CI updates newTag after each build
# via: sed -i 's|newTag: "prod-6955ac1c"
images:
  - name: harbor.jaali.dev/assessment/assessment-app
    newTag: "prod-6955ac1c"

patches:
  - target:
      kind: Deployment
      name: assessment-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
