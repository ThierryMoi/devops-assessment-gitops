# ──────────────────────────────────────────────
# Image
# ──────────────────────────────────────────────
image:
  repository: harbor.jaali.dev/assessment/assessment-app
  tag: "prod-00000000"
  pullPolicy: IfNotPresent

# ──────────────────────────────────────────────
# Deployment (production defaults)
# ──────────────────────────────────────────────
replicaCount: 3

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# ──────────────────────────────────────────────
# Service
# ──────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# ──────────────────────────────────────────────
# Namespace
# ──────────────────────────────────────────────
namespace:
  create: true
  name: assessment-app-prod

# ──────────────────────────────────────────────
# Gateway API (HTTPRoute)
# ──────────────────────────────────────────────
gateway:
  enabled: true
  hostname: "assessment.jaali.dev"
  parentRef:
    name: jaali-gateway
    namespace: envoy-gateway-system
  referenceGrant:
    enabled: true

# ──────────────────────────────────────────────
# Probes
# ──────────────────────────────────────────────
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    path: /healthz
    initialDelaySeconds: 3
    periodSeconds: 5
    failureThreshold: 2

# ──────────────────────────────────────────────
# Security
# ──────────────────────────────────────────────
securityContext:
  runAsNonRoot: true
  runAsUser: 101
  fsGroup: 101

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# ──────────────────────────────────────────────
# Pod settings
# ──────────────────────────────────────────────
automountServiceAccountToken: false
nodeSelector: {}
tolerations: []
affinity: {}
