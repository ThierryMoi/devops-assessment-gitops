# ──────────────────────────────────────────────
# Image
# ──────────────────────────────────────────────
image:
  repository: harbor.jaali.dev/assessment/assessment-app
  tag: "prod-00000000"
  pullPolicy: IfNotPresent

# ──────────────────────────────────────────────
# Rollout (Argo Rollouts canary)
# ──────────────────────────────────────────────
replicaCount: 3
revisionHistoryLimit: 5

rollout:
  strategy:
    canary:
      maxUnavailable: 0
      maxSurge: 1
      steps:
        - setWeight: 20
        - pause: { duration: 2m }
        - setWeight: 50
        - pause: { duration: 2m }
        - setWeight: 100

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# ──────────────────────────────────────────────
# Horizontal Pod Autoscaler
# ──────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max

# ──────────────────────────────────────────────
# Service
# ──────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# ──────────────────────────────────────────────
# Namespace
# ──────────────────────────────────────────────
namespace:
  create: true
  name: assessment-app-prod

# ──────────────────────────────────────────────
# Gateway API (HTTPRoute)
# ──────────────────────────────────────────────
gateway:
  enabled: true
  hostname: "assessment.jaali.dev"
  parentRef:
    name: jaali-gateway
    namespace: envoy-gateway-system
  referenceGrant:
    enabled: true

# ──────────────────────────────────────────────
# Probes
# ──────────────────────────────────────────────
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    path: /healthz
    initialDelaySeconds: 3
    periodSeconds: 5
    failureThreshold: 2

# ──────────────────────────────────────────────
# Security
# ──────────────────────────────────────────────
securityContext:
  runAsNonRoot: true
  runAsUser: 101
  fsGroup: 101

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# ──────────────────────────────────────────────
# Pod settings
# ──────────────────────────────────────────────
automountServiceAccountToken: false
nodeSelector: {}
tolerations: []
affinity: {}
